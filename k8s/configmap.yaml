---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: echo-app-config
  namespace: echo-app
  labels:
    app: echo-app
data:
  PORT: "8080"
  DATABASE_URL: "postgres://postgres:postgres@postgres-service:5432/echo_app?sslmode=disable"
  REDIS_URL: "redis://redis-service:6379/0"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq-service:5672/"
